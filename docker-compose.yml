services:
  video-platform:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: video-platform-ai:local
    container_name: video-platform-ai
    working_dir: /root/video_platform
    env_file:
      - .env.docker
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      VIDEO_PLATFORM_BASE_DIR: /root/video_platform
      PROJECT_ROOT: /root/video_platform
      PYTHONPATH: /root/video_platform
      TESSERACT_CMD: /usr/bin/tesseract
    volumes:
      - ./root/video_platform:/root/video_platform
    ports:
      - "${PORT:-5000}:5000"
    stdin_open: true
    tty: true
    command: ["web"]
