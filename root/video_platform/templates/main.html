<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视学智问 - 主页面</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet">
</head>
<body>
    <!-- 头部导航 -->
    <div class="header">
        <div class="logo">视学智问</div>
        <div class="user-info">
            <span>欢迎，{{ username }}</span>
            <a href="/logout" class="btn logout">退出登录</a>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 视频播放区 -->
        <div class="player-container">
            <!-- 上传区域 -->
            <div class="upload-area">
                <h3>上传视频</h3>
                <form id="upload-form" enctype="multipart/form-data">
                    <input type="file" name="video" class="file-input" accept="video/*" required>
                    <button type="submit" class="btn primary upload-btn">上传并处理</button>
                    <div id="upload-status" class="status"></div>
                </form>
            </div>
            <!-- 视频播放器 -->
            <div class="video-player-wrapper">
                <video id="video-player" class="video-js vjs-big-play-centered" controls></video>
            </div>
        </div>

        <!-- 侧边栏（知识点+提问） -->
        <div class="knowledge-sidebar">
            <h3>知识点列表</h3>
            <div id="knowledge-list"></div>
            <hr>
            <h3>智能提问</h3>
            <textarea id="user-question" rows="5" placeholder="输入你的问题..."></textarea>
            <button id="ask-btn" class="btn primary">提交提问</button>
            <div id="answer-container" class="answer-box"></div>
        </div>
    </div>

    <!-- 提问弹窗 -->
    <div id="question-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="modal-title"></h3>
            <p id="modal-question"></p>
            <textarea id="modal-answer" class="modal-input" rows="3"></textarea>
            <button id="modal-submit" class="btn primary">提交答案</button>
            <div id="modal-result" class="modal-result"></div>
        </div>
    </div>

    <input type="hidden" id="current-video-id">
    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
