<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ video.name }} - 学习助手</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="header">
    <span>{{ video.name }}</span>
    <a href="/" style="color:white;margin-left:20px;">返回主页</a>
  </div>
  <div class="container">
    <!-- 核心布局 -->
    <div class="learn-layout">
      <!-- 左侧：短视频+知识点 -->
      <div class="left-panel">
        <h4 style="color:#1890FF;margin-bottom:10px;">知识点/短视频</h4>
        {% for sub in sub_videos %}
          <div id="sub-{{ sub.id }}" class="sub-video-item" onclick="playSubVideo('sub-{{ sub.id }}', {{ sub.start_time }})" style="padding:5px;margin-bottom:5px;cursor:pointer;">
            {{ sub.name }} ({{ sub.start_time }}-{{ sub.end_time }}秒)
          </div>
        {% endfor %}
      </div>
      <!-- 中间：视频播放器 -->
      <div class="mid-panel">
        <video id="main-video" controls width="100%" style="border-radius:5px;" ontimeupdate="saveProgress('{{ video.id }}', this.currentTime)">
          <source src="/static/uploads/{{ video.file_name }}" type="video/mp4">
        </video>
        <!-- 视频摘要 -->
        <div style="margin-top:10px;padding:10px;background:#E6F4FF;border-radius:5px;">
          <h4 style="color:#1890FF;margin-bottom:5px;">视频摘要</h4>
          <p>{{ video.summary }}</p>
        </div>
      </div>
      <!-- 右侧：智能问答 -->
      <div class="right-panel">
        <h4 style="color:#1890FF;margin-bottom:10px;">智能问答</h4>
        <div style="margin-bottom:10px;">
          <input type="text" id="question-input" placeholder="输入你的问题..." style="width:100%;padding:8px;margin-bottom:5px;">
          <button onclick="submitQuestion()" class="btn" style="width:100%;">提交</button>
        </div>
        <div id="qa-history" style="max-height:400px;overflow-y:auto;">
          <!-- 问答历史 -->
        </div>
      </div>
    </div>
  </div>
  <!-- 提问弹窗（默认隐藏） -->
  <div id="question-modal" class="modal" style="display:none;">
    <h4 id="modal-question" style="margin-bottom:10px;"></h4>
    <input type="text" id="user-answer" placeholder="输入你的答案..." style="width:100%;padding:8px;margin-bottom:10px;">
    <button onclick="submitAnswer()" class="btn">提交回答</button>
    <button onclick="closeModal('question-modal')" class="btn" style="margin-left:10px;">跳过 ×</button>
  </div>
  <script>var videoId = "{{ video.id }}";</script>
  <script src="/static/js/main.js"></script>
</body>
</html>
