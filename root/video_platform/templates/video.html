<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ video.title }} - 课程视频助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: #f5f7fa; color: #333; }
        .header { background: #2c3e50; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header a { color: white; text-decoration: none; padding: 6px 12px; border-radius: 4px; background: #3498db; }
        
        /* 三栏式布局 */
        .container { display: flex; max-width: 1920px; margin: 24px auto; padding: 0 24px; gap: 24px; }
        
        /* 左侧栏：知识点/片段 */
        .left-sidebar { width: 250px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 16px; height: calc(100vh - 120px); overflow-y: auto; }
        .left-sidebar h3 { color: #2c3e50; font-size: 16px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .segment-item { padding: 8px 12px; border-radius: 4px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .segment-item:hover { background: #e3f2fd; }
        .segment-item.active { background: #3498db; color: white; }
        .segment-item .title { font-weight: 500; font-size: 14px; }
        .segment-item .time { font-size: 12px; color: #666; margin-top: 4px; }
        
        /* 中间主区：视频+摘要 */
        .main-content { flex: 1; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 24px; }
        .video-player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
        .video-player video { width: 100%; height: 100%; object-fit: contain; }
        .summary-section h3 { color: #2c3e50; font-size: 18px; margin-bottom: 16px; }
        .summary-content { line-height: 1.8; font-size: 14px; color: #333; white-space: pre-line; }
        
        /* 右侧栏：智能问答 */
        .right-sidebar { width: 350px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 16px; height: calc(100vh - 120px); display: flex; flex-direction: column; }
        .right-sidebar h3 { color: #2c3e50; font-size: 16px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .chat-container { flex: 1; overflow-y: auto; margin-bottom: 16px; }
        .chat-message { margin-bottom: 12px; }
        .chat-user { text-align: right; }
        .chat-user .message { background: #3498db; color: white; padding: 8px 12px; border-radius: 8px 8px 0 8px; display: inline-block; max-width: 80%; }
        .chat-ai { text-align: left; }
        .chat-ai .message { background: #f1f1f1; color: #333; padding: 8px 12px; border-radius: 8px 8px 8px 0; display: inline-block; max-width: 80%; }
        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        .chat-input button { padding: 8px 16px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .chat-input button:hover { background: #2980b9; }
        
        .loading { color: #666; font-size: 12px; text-align: center; padding: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 课程视频智能助手</h1>
        <a href="{{ url_for('index') }}">返回首页</a>
    </div>

    <div class="container">
        <!-- 左侧栏：知识点/片段 -->
        <div class="left-sidebar">
            <h3>📝 知识点/视频片段</h3>
            <div id="segments-list">
                <div class="loading">加载知识点中...</div>
            </div>
        </div>

        <!-- 中间主区：视频+摘要 -->
        <div class="main-content">
            <div class="video-player">
                <video id="video-player" controls>
                    <source src="{{ url_for('static', filename='../' + video.file_path) }}" type="video/mp4">
                    您的浏览器不支持视频播放
                </video>
            </div>
            
            <div class="summary-section">
                <h3>📋 核心知识点摘要</h3>
                <div class="summary-content">
                    {{ video.summary or "暂无摘要" }}
                </div>
            </div>
        </div>

        <!-- 右侧栏：智能问答 -->
        <div class="right-sidebar">
            <h3>🤖 智能学习助手</h3>
            
            <div class="chat-container" id="chat-container">
                <div class="chat-ai">
                    <div class="message">你好！我是你的学习助手，可以回答关于本视频的问题～</div>
                </div>
            </div>
            
            <div class="chat-input">
                <input type="text" id="question-input" placeholder="输入你的问题...">
                <button id="send-btn">发送</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        const videoId = {{ video.id }};
        const videoPlayer = document.getElementById('video-player');
        
        // 加载知识点片段
        async function loadSegments() {
            try {
                const response = await fetch(`/video/${videoId}/segments`);
                const result = await response.json();
                
                if (result.code === 200 && result.data.length > 0) {
                    const segmentsList = document.getElementById('segments-list');
                    segmentsList.innerHTML = '';
                    
                    result.data.forEach(segment => {
                        const item = document.createElement('div');
                        item.className = 'segment-item';
                        item.innerHTML = `
                            <div class="title">${segment.title}</div>
                            <div class="time">${segment.start.toFixed(1)} - ${segment.end.toFixed(1)} 秒</div>
                        `;
                        
                        // 点击跳转视频
                        item.addEventListener('click', () => {
                            // 移除所有active
                            document.querySelectorAll('.segment-item').forEach(el => {
                                el.classList.remove('active');
                            });
                            // 添加active
                            item.classList.add('active');
                            // 跳转视频
                            videoPlayer.currentTime = segment.start;
                            videoPlayer.play();
                        });
                        
                        segmentsList.appendChild(item);
                    });
                } else {
                    document.getElementById('segments-list').innerHTML = '<div class="loading">暂无知识点片段</div>';
                }
            } catch (error) {
                console.error('加载片段失败：', error);
                document.getElementById('segments-list').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 发送问答请求
        async function sendQuestion() {
            const questionInput = document.getElementById('question-input');
            const question = questionInput.value.trim();
            
            if (!question) {
                alert('请输入问题！');
                return;
            }
            
            // 添加用户消息
            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML += `
                <div class="chat-user">
                    <div class="message">${question}</div>
                </div>
            `;
            chatContainer.innerHTML += '<div class="chat-ai"><div class="loading">AI思考中...</div></div>';
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // 清空输入框
            questionInput.value = '';
            
            try {
                // 发送请求
                const formData = new FormData();
                formData.append('video_id', videoId);
                formData.append('question', question);
                
                const response = await fetch('/video/question', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                // 移除加载状态
                const loadingEl = chatContainer.querySelector('.loading');
                if (loadingEl) loadingEl.parentElement.remove();
                
                // 添加AI回答
                if (result.code === 200) {
                    chatContainer.innerHTML += `
                        <div class="chat-ai">
                            <div class="message">${result.data.answer.replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                } else {
                    chatContainer.innerHTML += `
                        <div class="chat-ai">
                            <div class="message">❌ ${result.msg || '回答失败'}</div>
                        </div>
                    `;
                }
                
                // 滚动到底部
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (error) {
                console.error('问答失败：', error);
                const loadingEl = chatContainer.querySelector('.loading');
                if (loadingEl) loadingEl.parentElement.remove();
                
                chatContainer.innerHTML += `
                    <div class="chat-ai">
                        <div class="message">❌ 网络错误，请重试</div>
                    </div>
                `;
            }
        }
        
        // 绑定事件
        document.getElementById('send-btn').addEventListener('click', sendQuestion);
        document.getElementById('question-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuestion();
        });
        
        // 初始化
        window.onload = () => {
            loadSegments();
        };
    </script>
</body>
</html>
