<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视学智问 - 教育视频智能助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="layout">
        <!-- 左侧侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>视学智问</h2>
                <p>教育视频智能助手</p>
            </div>
            <div class="sidebar-menu">
                <a href="/upload" class="menu-item active">
                    <span>📤</span> 上传教育视频
                </a>
                <a href="/index" class="menu-item">
                    <span>📚</span> 学习历史记录
                </a>
            </div>
        </div>
        <!-- 右侧内容区 -->
        <div class="content">
            <div class="content-header">
                <h1>欢迎，{{ username }}！</h1>
                <a href="/logout" class="btn-logout">退出登录</a>
            </div>
            <div class="content-body">
                <div class="card">
                    <h2>学习历史记录</h2>
                    {% if video_history %}
                        <ul class="video-list">
                            {% for video in video_history %}
                                <li>
                                    <div class="video-info">
                                        <span class="video-name">{{ video.filename }}</span>
                                        <span class="video-status {{ video.status }}">{{ video.status }}</span>
                                    </div>
                                    <a href="/video/{{ video.id }}" class="btn-view">查看</a>
                                </li>
                            {% endfor %}
                        </ul>
                    {% else %}
                        <p class="empty-tip">暂无视频记录，请先上传视频</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
