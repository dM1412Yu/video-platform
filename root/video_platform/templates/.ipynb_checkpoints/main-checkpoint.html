<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视学智问 - 智能视频学习</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- 视频播放器样式 -->
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo">视学智问</div>
        <div class="user-info">
            <span>欢迎，{{ username }}</span>
            <a href="/logout" class="btn logout">退出登录</a>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 左侧：B站式视频播放器 -->
        <div class="player-container">
            <!-- 视频上传区域 -->
            <div class="upload-area">
                <h3>上传学习视频</h3>
                <form id="upload-form" enctype="multipart/form-data">
                    <input type="file" name="video" accept="video/*" required class="file-input">
                    <button type="submit" class="btn primary upload-btn">上传并处理</button>
                </form>
                <div id="upload-status" class="status"></div>
            </div>

            <!-- 视频播放器 -->
            <div class="video-player-wrapper">
                <video id="video-player" class="video-js vjs-big-play-centered" controls preload="auto" width="100%" height="480">
                    <p class="vjs-no-js">
                        请启用JavaScript以观看视频
                    </p>
                </video>
            </div>

            <!-- 侧边提问框（B站风格） -->
            <div class="question-sidebar">
                <h4>视频提问</h4>
                <input type="hidden" id="current-video-id">
                <textarea id="user-question" placeholder="输入你对视频内容的疑问..." rows="3"></textarea>
                <button id="ask-btn" class="btn primary">提交提问</button>
                <div id="answer-container" class="answer-box"></div>
            </div>
        </div>

    <!-- 知识点提问弹窗 -->
    <div id="question-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="modal-title">知识点提问</h3>
            <div id="modal-question" class="modal-question"></div>
            <textarea id="modal-answer" placeholder="请输入你的答案..." rows="5" class="modal-input"></textarea>
            <button id="modal-submit" class="btn primary">提交答案</button>
            <div id="modal-result" class="modal-result"></div>
        </div>
    </div>

    <!-- 视频播放器脚本 -->
    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    <!-- 前端交互脚本 -->
    <script src="/static/js/main.js"></script>
</body>
</html>
