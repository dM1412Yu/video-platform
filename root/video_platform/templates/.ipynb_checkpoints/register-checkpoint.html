<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视学智问 - 注册</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <h1>视学智问 - 注册</h1>
        <form method="POST" action="/register">
            <div class="input-group">
                <label>用户名</label>
                <input type="text" name="username" required placeholder="请设置用户名">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="请设置密码">
            </div>
            <div class="input-group">
                <label>确认密码</label>
                <input type="password" name="confirm_pwd" required placeholder="请确认密码">
            </div>
            <button type="submit" class="btn primary">注册</button>
        </form>
        <p class="switch-link">已有账号？<a href="/login">立即登录</a></p>
        
        <!-- 提示框 -->
        {% if alert_msg %}
        <div class="alert {{ alert_type }}">
            {{ alert_msg }}
        </div>
        {% endif %}
    </div>
</body>
</html>
